id: ls_exercise
lesson_id: ls
title: "Practice: ls"
steps:
  - prompt: "You're in /home/user. List the files and directories here."
    expected: "ls"
    output: "Documents  Downloads  notes.txt  script.sh"
    explanation: "ls shows everything in your current directory. You can see two folders and two files."

  - prompt: "You want to see file sizes, permissions, and dates. Use the long format flag."
    expected: "ls -l"
    output: |
      drwxr-xr-x  2 user user 4096 Apr 10 09:00 Documents
      drwxr-xr-x  2 user user 4096 Apr  8 11:30 Downloads
      -rw-r--r--  1 user user  142 Apr 10 08:45 notes.txt
      -rwxr-xr-x  1 user user  512 Apr  9 14:00 script.sh
    explanation: "The first column shows permissions. d means directory, - means file. The r/w/x show read/write/execute access."

  - prompt: "There might be hidden config files here. List all files including hidden ones."
    expected: "ls -a"
    output: ".  ..  .bashrc  .ssh  Documents  Downloads  notes.txt  script.sh"
    explanation: ".bashrc and .ssh were hidden because they start with a dot. These often contain sensitive configuration — worth knowing they're there."

  - prompt: "Combine both flags to see all files with full detail."
    expected: "ls -la"
    output: |
      total 40
      drwxr-xr-x  5 user user 4096 Apr 10 09:00 .
      drwxr-xr-x 12 root root 4096 Apr  5 14:00 ..
      -rw-r--r--  1 user user  220 Apr  5 14:00 .bashrc
      drwx------  2 user user 4096 Apr  5 14:00 .ssh
      drwxr-xr-x  2 user user 4096 Apr 10 09:00 Documents
      drwxr-xr-x  2 user user 4096 Apr  8 11:30 Downloads
      -rw-r--r--  1 user user  142 Apr 10 08:45 notes.txt
      -rwxr-xr-x  1 user user  512 Apr  9 14:00 script.sh
    explanation: "Notice .ssh has drwx------ permissions — only the owner can access it. That's intentional; SSH keys should be private."
